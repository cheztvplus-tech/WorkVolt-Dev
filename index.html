<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <title>Work Volt - Login</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .field { width:100%; padding:.75rem 1rem; border:1.5px solid #e2e8f0; border-radius:12px; font-size:.875rem; outline:none; transition:border-color .15s, box-shadow .15s; }
    .field:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.15); }
    .btn-primary { display:flex; align-items:center; justify-content:center; gap:.5rem; padding:.75rem 1.5rem; background:#2563eb; color:#fff; border:none; border-radius:12px; font-size:.875rem; font-weight:600; cursor:pointer; transition:background .15s, transform .1s; }
    .btn-primary:hover { background:#1d4ed8; }
    .btn-primary:active { transform:scale(.98); }
    .btn-primary:disabled { opacity:.6; cursor:not-allowed; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .shake { animation: shake 0.3s ease-in-out; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-600 via-blue-700 to-indigo-800 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-16 h-16 bg-white/15 border border-white/30 rounded-2xl flex items-center justify-center mb-4 backdrop-blur-sm">
        <i class="fas fa-bolt text-white text-3xl"></i>
      </div>
      <h1 class="text-3xl font-extrabold text-white tracking-tight">Work Volt</h1>
      <p class="text-blue-200 mt-1 text-sm font-medium">Power your operations</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
      <div class="bg-blue-50 border-b border-blue-100 px-6 py-3 flex items-center gap-2">
        <i class="fas fa-shield-alt text-blue-500"></i>
        <span class="text-xs font-bold text-blue-700 uppercase tracking-wide">Secure Sign In</span>
      </div>

      <div class="p-6 space-y-4">
        <!-- Error Message -->
        <div id="login-error" class="hidden p-3 bg-red-50 border border-red-200 rounded-xl text-xs text-red-600 flex items-center gap-2">
          <i class="fas fa-exclamation-circle"></i>
          <span id="error-text"></span>
        </div>

        <!-- GAS URL ONLY -->
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Work Volt URL</label>
          <input id="gas-url" type="url" class="field" placeholder="https://script.google.com/macros/s/.../exec">
          <p class="text-xs text-slate-400 mt-1">Your Google Apps Script Web App URL</p>
        </div>

        <!-- Username -->
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Username (Email)</label>
          <input id="username" type="email" class="field" placeholder="admin@workvolt.app" autocomplete="off">
        </div>

        <!-- Password -->
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Password</label>
          <div class="relative">
            <input id="password" type="password" class="field pr-10" placeholder="••••••••" autocomplete="off">
            <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
              <i id="eye-icon" class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- Login Button -->
        <button onclick="doLogin()" id="login-btn" class="btn-primary w-full mt-2">
          <i class="fas fa-sign-in-alt"></i>
          <span>Sign In</span>
        </button>

        <!-- Hint -->
        <div id="reset-hint" class="hidden mt-4 p-3 bg-amber-50 border border-amber-200 rounded-xl text-xs text-amber-700">
          <i class="fas fa-info-circle mr-1"></i>
          Contact your SuperAdmin to reset your password.
        </div>
      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-blue-200/60 text-xs mt-6">
      Work Volt v1.0.0 • Secure Business Management
    </p>
  </div>

  // ── Core i18n API ─────────────────────────────────────────────────

  let _currentLang = localStorage.getItem(LANG_KEY) || 'en';

  function getLang() { return _currentLang; }

  function setLang(lang) {
    if (!TRANSLATIONS[lang]) return;
    _currentLang = lang;
    localStorage.setItem(LANG_KEY, lang);
    // Fire an event so pages can re-render
    document.dispatchEvent(new CustomEvent('wv:langchange', { detail: { lang } }));
    // Re-render nav if available
    if (typeof window.renderNav === 'function') window.renderNav();
    // Re-render current page module
    const main = document.getElementById('main-content');
    const lastModule = sessionStorage.getItem('lastModule') || 'dashboard';
    if (main && typeof window.WorkVolt !== 'undefined') {
      window.WorkVolt.navigate(lastModule);
    }
  }

  function t(key) {
    const dict = TRANSLATIONS[_currentLang] || TRANSLATIONS.en;
    return dict[key] !== undefined ? dict[key] : (TRANSLATIONS.en[key] !== undefined ? TRANSLATIONS.en[key] : key);
  }

  // ── Language toggle button HTML ───────────────────────────────────
  function langToggleHTML() {
    const isEN = _currentLang === 'en';
    return `
      <button
        onclick="window.WVI18n.setLang('${isEN ? 'fr' : 'en'}')"
        title="${isEN ? 'Switch to French' : 'Passer en anglais'}"
        style="display:flex;align-items:center;gap:6px;padding:5px 10px;background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;color:#475569;font-family:inherit;transition:all 0.15s;white-space:nowrap;"
        onmouseover="this.style.background='#e2e8f0'" onmouseout="this.style.background='#f1f5f9'"
      >
        ${isEN
          ? `<span style="font-size:15px">🇺🇸</span> EN`
          : `<span style="font-size:15px">🇫🇷</span> FR`
        }
      </button>`;
  }

  // ── Apply to Login page (index.html) ─────────────────────────────
  function applyToLoginPage() {
    // Run after DOM is ready
    function apply() {
      // subtitle
      const sub = document.querySelector('p.text-blue-200');
      if (sub) sub.textContent = t('Power your operations');

      // Secure Sign In badge
      const badge = document.querySelector('.fas.fa-shield-alt + span');
      if (badge) badge.textContent = t('Secure Sign In');

      // Labels
      document.querySelectorAll('label').forEach(el => {
        const txt = el.textContent.trim();
        const tr = t(txt);
        if (tr !== txt) el.textContent = tr;
      });

      // Placeholders
      const gasInput = document.getElementById('gas-url');
      if (gasInput) gasInput.placeholder = 'https://script.google.com/macros/s/.../exec';

      const usernameInput = document.getElementById('username');
      if (usernameInput) usernameInput.placeholder = 'admin@workvolt.app';

      const gasHelper = document.querySelector('#gas-url + p');
      if (gasHelper) gasHelper.textContent = t('Your Google Apps Script Web App URL');

      // Button
      const loginBtn = document.getElementById('login-btn');
      if (loginBtn) {
        const span = loginBtn.querySelector('span');
        if (span) span.textContent = t('Sign In');
      }

      // Footer
      const footer = document.querySelector('p.text-center.text-blue-200\\/60');
      if (footer) footer.textContent = t('Work Volt v1.0.0 • Secure Business Management');

      // Inject lang toggle
      injectLoginLangToggle();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', apply);
    } else {
      apply();
    }

    document.addEventListener('wv:langchange', apply);
  }

  function injectLoginLangToggle() {
    let btn = document.getElementById('wv-lang-toggle');
    if (!btn) {
      btn = document.createElement('div');
      btn.id = 'wv-lang-toggle';
      btn.style.cssText = 'position:fixed;top:12px;right:12px;z-index:999';
      document.body.appendChild(btn);
    }
    btn.innerHTML = langToggleHTML();
  }

  // ── Inject toggle into main app header ───────────────────────────
  function injectMainLangToggle() {
    let existing = document.getElementById('wv-lang-toggle');
    if (existing) { existing.innerHTML = langToggleHTML(); return; }
    existing = document.createElement('div');
    existing.id = 'wv-lang-toggle';
    existing.innerHTML = langToggleHTML();
    // Insert before user-menu-container
    const userMenu = document.getElementById('user-menu-container');
    if (userMenu) {
      userMenu.parentNode.insertBefore(existing, userMenu);
    }
  }

  // ── Expose globally ───────────────────────────────────────────────
  window.WVI18n = { t, getLang, setLang, langToggleHTML, injectMainLangToggle, injectLoginLangToggle, applyToLoginPage };
  window.t = t; // shorthand

})();

</script>
  <script>
    // Apply translations to login page
    window.WVI18n.applyToLoginPage();

    // ─────────────────────────────────────────────
    //  LOGIN LOGIC - NO LOCAL STORAGE (Session Only)
    // ─────────────────────────────────────────────

    // Parse URL parameter for gas_url only (not stored)
    const params = new URLSearchParams(window.location.search);
    if (params.get('gas_url')) {
      document.getElementById('gas-url').value = params.get('gas_url');
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    function showError(msg) {
      const box = document.getElementById('login-error');
      const text = document.getElementById('error-text');
      text.textContent = msg;
      box.classList.remove('hidden');
      box.classList.add('shake');
      setTimeout(() => box.classList.remove('shake'), 300);
    }

    function hideError() {
      document.getElementById('login-error').classList.add('hidden');
    }

    async function doLogin() {
      const btn = document.getElementById('login-btn');
      const url = document.getElementById('gas-url').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      hideError();

      if (!url) return showError(t('Please enter your Work Volt URL'));
      if (!username) return showError(t('Please enter your username (email)'));
      if (!password) return showError(t('Please enter your password'));

      btn.disabled = true;
      const originalContent = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i><span>' + t('Signing in...') + '</span>';

      try {
        // Hash password (SHA-256)
        const msgBuffer = new TextEncoder().encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const passwordHash = Array.from(new Uint8Array(hashBuffer))
          .map(b => b.toString(16).padStart(2, '0'))
          .join('');

        // Call GAS login endpoint - NO sheet_id needed!
        const loginUrl = new URL(url);
        loginUrl.searchParams.set('path', 'auth/login');
        loginUrl.searchParams.set('email', username);
        loginUrl.searchParams.set('password_hash', passwordHash);

        const res = await fetch(loginUrl.toString(), { cache: 'no-cache' });
        const data = await res.json();

        if (data.error) throw new Error(data.error);
        if (!data.success || !data.user) throw new Error('Login failed');

        // Store ONLY in sessionStorage (cleared when tab closes) + memory
        sessionStorage.setItem('wv_gas_url', url);
        sessionStorage.setItem('wv_session', data.session_id);
        sessionStorage.setItem('wv_user', JSON.stringify(data.user));

        // Also set in memory for main.html to access immediately
        window.sessionData = {
          gas_url: url,
          session_id: data.session_id,
          user: data.user
        };

        window.location.href = 'main.html';

      } catch(e) {
        showError(e.message || 'Login failed. Please check your credentials.');
        btn.disabled = false;
        btn.innerHTML = originalContent;
      }
    }

    // Allow Enter key to submit
    document.getElementById('password')?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
