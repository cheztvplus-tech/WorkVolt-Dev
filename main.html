  // ── Core i18n API ─────────────────────────────────────────────────

  let _currentLang = localStorage.getItem(LANG_KEY) || 'en';

  function getLang() { return _currentLang; }

  function setLang(lang) {
    if (!TRANSLATIONS[lang]) return;
    _currentLang = lang;
    localStorage.setItem(LANG_KEY, lang);
    // Fire an event so pages can re-render
    document.dispatchEvent(new CustomEvent('wv:langchange', { detail: { lang } }));
    // Re-render nav if available
    if (typeof window.renderNav === 'function') window.renderNav();
    // Re-render current page module
    const main = document.getElementById('main-content');
    const lastModule = sessionStorage.getItem('lastModule') || 'dashboard';
    if (main && typeof window.WorkVolt !== 'undefined') {
      window.WorkVolt.navigate(lastModule);
    }
  }

  function t(key) {
    const dict = TRANSLATIONS[_currentLang] || TRANSLATIONS.en;
    return dict[key] !== undefined ? dict[key] : (TRANSLATIONS.en[key] !== undefined ? TRANSLATIONS.en[key] : key);
  }

  // ── Language toggle button HTML ───────────────────────────────────
  function langToggleHTML() {
    const isEN = _currentLang === 'en';
    return `
      <button
        onclick="window.WVI18n.setLang('${isEN ? 'fr' : 'en'}')"
        title="${isEN ? 'Switch to French' : 'Passer en anglais'}"
        style="display:flex;align-items:center;gap:6px;padding:5px 10px;background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;color:#475569;font-family:inherit;transition:all 0.15s;white-space:nowrap;"
        onmouseover="this.style.background='#e2e8f0'" onmouseout="this.style.background='#f1f5f9'"
      >
        ${isEN
          ? `<span style="font-size:15px">🇺🇸</span> EN`
          : `<span style="font-size:15px">🇫🇷</span> FR`
        }
      </button>`;
  }

  // ── Apply to Login page (index.html) ─────────────────────────────
  function applyToLoginPage() {
    // Run after DOM is ready
    function apply() {
      // subtitle
      const sub = document.querySelector('p.text-blue-200');
      if (sub) sub.textContent = t('Power your operations');

      // Secure Sign In badge
      const badge = document.querySelector('.fas.fa-shield-alt + span');
      if (badge) badge.textContent = t('Secure Sign In');

      // Labels
      document.querySelectorAll('label').forEach(el => {
        const txt = el.textContent.trim();
        const tr = t(txt);
        if (tr !== txt) el.textContent = tr;
      });

      // Placeholders
      const gasInput = document.getElementById('gas-url');
      if (gasInput) gasInput.placeholder = 'https://script.google.com/macros/s/.../exec';

      const usernameInput = document.getElementById('username');
      if (usernameInput) usernameInput.placeholder = 'admin@workvolt.app';

      const gasHelper = document.querySelector('#gas-url + p');
      if (gasHelper) gasHelper.textContent = t('Your Google Apps Script Web App URL');

      // Button
      const loginBtn = document.getElementById('login-btn');
      if (loginBtn) {
        const span = loginBtn.querySelector('span');
        if (span) span.textContent = t('Sign In');
      }

      // Footer
      const footer = document.querySelector('p.text-center.text-blue-200\\/60');
      if (footer) footer.textContent = t('Work Volt v1.0.0 • Secure Business Management');

      // Inject lang toggle
      injectLoginLangToggle();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', apply);
    } else {
      apply();
    }

    document.addEventListener('wv:langchange', apply);
  }

  function injectLoginLangToggle() {
    let btn = document.getElementById('wv-lang-toggle');
    if (!btn) {
      btn = document.createElement('div');
      btn.id = 'wv-lang-toggle';
      btn.style.cssText = 'position:fixed;top:12px;right:12px;z-index:999';
      document.body.appendChild(btn);
    }
    btn.innerHTML = langToggleHTML();
  }

  // ── Inject toggle into main app header ───────────────────────────
  function injectMainLangToggle() {
    let existing = document.getElementById('wv-lang-toggle');
    if (existing) { existing.innerHTML = langToggleHTML(); return; }
    existing = document.createElement('div');
    existing.id = 'wv-lang-toggle';
    existing.innerHTML = langToggleHTML();
    // Insert before user-menu-container
    const userMenu = document.getElementById('user-menu-container');
    if (userMenu) {
      userMenu.parentNode.insertBefore(existing, userMenu);
    }
  }

  // ── Expose globally ───────────────────────────────────────────────
  window.WVI18n = { t, getLang, setLang, langToggleHTML, injectMainLangToggle, injectLoginLangToggle, applyToLoginPage };
  window.t = t; // shorthand

})();

</script>

  <script>
  // ─────────────────────────────────────────────
  //  CONFIG & STATE
  // ─────────────────────────────────────────────
  let API_URL         = '';
  let SHEET_ID        = '';
  let currentUser     = null;
  let currentSession  = null;
  let _setupData      = {};

  // Module → allowed roles
  const MODULE_ROLES = {
    dashboard:  ['SuperAdmin','Admin','Manager','Employee','Contractor'],
    settings:   ['SuperAdmin','Admin'],
    store:      ['SuperAdmin','Admin'],
    roles:      ['SuperAdmin','Admin'],
  };

  const MODULE_ICONS = {
    dashboard:  'fa-th-large',
    settings:   'fa-cog',
    store:      'fa-store',
    roles:      'fa-shield-alt',
  };

  const MODULE_LABELS = {
    dashboard:  'Dashboard',
    settings:   'Settings',
    store:      'Module Store',
    roles:      'Role Permissions',
  };

  let _rolePermissions   = {};
  let _userModuleOverrides = {};

  async function loadRolePermissions() {
    const savedUrl = sessionStorage.getItem('wv_gas_url') || '';
    const API_TOKEN = 'wv_4f8a2e1b9c7d3f6a0e5b8c2d4f7a1e3b'; // <--- API secret here
    
    if (!savedUrl || !currentSession) return;

    try {
      const url = new URL(savedUrl);
      url.searchParams.set('path', 'config/get-all');
      url.searchParams.set('token', API_TOKEN);
      url.searchParams.set('session_id', currentSession);
      
      console.log('Fetching config from:', url.toString().replace(API_TOKEN, '***'));
      
      const res = await fetch(url.toString(), { cache: 'no-cache' });
      const text = await res.text();
      console.log('Config response:', text.substring(0, 200));
      
      const data = JSON.parse(text);
      const settings = data.settings || {};
      if (settings.role_permissions) {
        try { _rolePermissions = JSON.parse(settings.role_permissions); } catch(e) {}
      }
      if (settings.user_module_overrides) {
        try { _userModuleOverrides = JSON.parse(settings.user_module_overrides); } catch(e) {}
      }
    } catch(e) {
      console.warn('Could not load role permissions:', e.message);
    }
  }

  function resolvedRolesForModule(moduleId) {
    if (_rolePermissions[moduleId]) {
      return Object.entries(_rolePermissions[moduleId])
        .filter(([, allowed]) => allowed)
        .map(([role]) => role);
    }
    const def = ADDON_CATALOGUE[moduleId];
    return (def && def.roles) || [];
  }

  function canAccessModule(moduleId) {
    const role = currentUser?.role || 'Employee';
    const userId = currentUser?.user_id || '';

    if (moduleId === 'dashboard') return true;
    if (MODULE_ROLES[moduleId]) return MODULE_ROLES[moduleId].includes(role);
    if (role === 'SuperAdmin') return true;
    if (_userModuleOverrides[userId]) {
      return _userModuleOverrides[userId].includes(moduleId);
    }
    return resolvedRolesForModule(moduleId).includes(role);
  }

  function saveInstalledModules() {

  async function loadInstalledModules() {
    const savedUrl = sessionStorage.getItem('wv_gas_url') || '';
    const API_TOKEN = 'wv_4f8a2e1b9c7d3f6a0e5b8c2d4f7a1e3b'; // <--- API secret here
    
    if (savedUrl) { API_URL = savedUrl; window.API_URL = savedUrl; }

    if (savedUrl && currentSession) {
      try {
        const url = new URL(savedUrl);
        url.searchParams.set('path', 'config/modules');
        url.searchParams.set('token', API_TOKEN);
        url.searchParams.set('session_id', currentSession);
        
        console.log('Fetching modules from:', url.toString().replace(API_TOKEN, '***'));
        
        const res = await fetch(url.toString(), { cache: 'no-cache' });
        const text = await res.text();
        console.log('Modules response:', text.substring(0, 200));
        
        const data = JSON.parse(text);
        if (data.modules) {
          INSTALLED_MODULES = data.modules;
          window.INSTALLED_MODULES = INSTALLED_MODULES;
        } else if (data.error) {
          console.error('Modules API error:', data.error);
        }
      } catch(e) {
        console.warn('Could not load modules from Sheet:', e.message);
      }
    }
  }

  // ─────────────────────────────────────────────
  //  API HELPER - WITH token
  // ─────────────────────────────────────────────
  async function apiCall(path, params = {}, retries = 2) {
    const savedUrl = sessionStorage.getItem('wv_gas_url') || API_URL;
    const API_TOKEN = 'wv_4f8a2e1b9c7d3f6a0e5b8c2d4f7a1e3b';  // <--- API secret here
    
    const url = new URL(savedUrl);
    url.searchParams.set('path', path);
    url.searchParams.set('token', API_TOKEN);
    url.searchParams.set('_t', Date.now().toString());
    if (currentSession) url.searchParams.set('session_id', currentSession);
    for (const k in params) {
      if (params[k] !== undefined && params[k] !== null)
        url.searchParams.set(k, params[k]);
    }

    console.log('API call:', path, url.toString().replace(API_TOKEN, '***'));

    let lastErr;
    for (let i = 0; i <= retries; i++) {
      try {
        const ctrl = new AbortController();
        const tid = setTimeout(() => ctrl.abort(), 15000);
        const res = await fetch(url.toString(), { method:'GET', mode:'cors', cache:'no-cache', signal: ctrl.signal });
        clearTimeout(tid);

        console.log('Response status:', res.status);

        if (res.status === 401 || res.status === 403) {
          console.error('Auth failed - token invalid');
          throw new Error('TOKEN_INVALID');
        }
        if (!res.ok) throw new Error('HTTP ' + res.status);

        const text = await res.text();
        console.log('Response text:', text.substring(0, 200));
        
        if (!text) throw new Error('Empty response');
        const data = JSON.parse(text);

        if (data.error) {
          console.error('API error:', data.error);
          if (data.code === 'TOKEN_INVALID' || data.error === 'TOKEN_INVALID' || data.error === 'Unauthorized') throw new Error('TOKEN_INVALID');
          throw new Error(data.error);
        }
        return data;

      } catch(err) {
        lastErr = err;
        console.error('API error attempt ' + i + ':', err.message);
        if (err.name === 'AbortError') lastErr = new Error('Request timeout — please try again');
        else if (err.message === 'TOKEN_INVALID' && path !== 'auth/login') {
          forceLogout('Session expired. Please sign in again.');
          throw new Error('Session expired');
        }
        if (i < retries) await new Promise(r => setTimeout(r, 800 * (i + 1)));
      }
    }
    throw lastErr || new Error('Network error — please refresh');
  }

    sessionStorage.removeItem('wv_user');
    sessionStorage.removeItem('wv_session');
    sessionStorage.removeItem('wv_gas_url');
    currentUser = null;
    currentSession = null;
    window.location.href = 'index.html';
  }

  function forceLogout(msg) {
    sessionStorage.removeItem('wv_user');
    sessionStorage.removeItem('wv_session');
    sessionStorage.removeItem('wv_gas_url');
    currentUser = null;
    currentSession = null;
    if (msg) showToast(msg, 'error');

      window.WVI18n.injectMainLangToggle();
      const placeholder = document.getElementById('global-search');
      if (placeholder) placeholder.placeholder = t('Search...');
      const loadingText = document.querySelector('[data-i18n="Loading..."]');
      if (loadingText) loadingText.textContent = t('Loading...');
    });

    const lastModule = sessionStorage.getItem('lastModule') || 'dashboard';
    history.replaceState({ module: lastModule }, '', '#' + lastModule);
    showModule(lastModule, false);
    updateBackButton();
  }

  function updateNotificationBell() {
    const bell = document.getElementById('header-notif-bell');
    const badge = document.getElementById('header-notif-badge');
    if (!bell) return;
    
    if (canAccessModule('notifications')) {
      bell.classList.remove('hidden');
      pollNotifBadge();
      setInterval(pollNotifBadge, 30000);
    } else {
      bell.classList.add('hidden');
    }
  }

  async function pollNotifBadge() {
    const badge = document.getElementById('header-notif-badge');
    if (!badge || badge.parentElement.classList.contains('hidden')) return;
    
    try {
      const data = await window.WorkVolt.api('notifications/unread', { user_id: currentUser?.user_id || '' });
      if (data.unread > 0) {
        badge.classList.remove('hidden');
        badge.title = data.unread + ' unread';
      } else {
        badge.classList.add('hidden');
      }
    } catch(e) {
      // Silent fail - don't spam errors if module not ready
    }
  }

  function _navOrderKey() {
    return 'wv_nav_order_' + (currentUser?.user_id || 'default');

  function _getSavedOrder() {

  }

    localStorage.setItem(_navOrderKey(), JSON.stringify(ids));

  function renderNav() {
    const nav = document.getElementById('nav-menu');

    const dashLink = `

         class="nav-item flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-medium transition-colors"

        <span class="nav-label">${t('Dashboard')}</span>
      </a>`;

      if (!canAccessModule(m.id)) return false;
      return true;
    });

    const savedOrder = _getSavedOrder();
    if (savedOrder.length) {
      addons.sort((a, b) => {
        const ai = savedOrder.indexOf(a.id);
        const bi = savedOrder.indexOf(b.id);
        if (ai === -1 && bi === -1) return 0;
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
      });
    }

    const addonLinks = addons.length ? `

        <a href="#settings" onclick="showModule('settings'); return false;"

           data-module="settings">
          <i class="fas fa-cog w-4 text-slate-400"></i>
          <span class="nav-label">${t('Settings')}</span>
        </a>` : ''}
        ${MODULE_ROLES.store.includes(role) ? `
        <a href="#store" onclick="showModule('store'); return false;"
           class="nav-item flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-medium transition-colors"
           data-module="store">
          <i class="fas fa-store w-4 text-slate-400"></i>
          <span class="nav-label">${t('Module Store')}</span>
        </a>` : ''}

        <a href="#roles" onclick="showModule('roles'); return false;"
           class="nav-item flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-medium transition-colors"
           data-module="roles">
          <i class="fas fa-shield-alt w-4 text-slate-400"></i>
          <span class="nav-label">${t('Role Permissions')}</span>

  function _initNavDrag() {
    const sortable = document.getElementById('nav-sortable');
    if (!sortable) return;
    let dragEl = null;

    sortable.querySelectorAll('.nav-sortable-item').forEach(item => {
      item.addEventListener('dragstart', e => {
        dragEl = item;
        setTimeout(() => { item.style.opacity = '0.4'; }, 0);
        e.dataTransfer.effectAllowed = 'move';
      });
      item.addEventListener('dragend', () => {
        item.style.opacity = '';
        dragEl = null;
        const order = Array.from(sortable.querySelectorAll('.nav-sortable-item')).map(el => el.dataset.moduleId);
        _saveNavOrder(order);
      });
      item.addEventListener('dragover', e => {
        e.preventDefault();
        if (!dragEl || dragEl === item) return;
        const rect = item.getBoundingClientRect();
        if (e.clientY < rect.top + rect.height / 2) {
          sortable.insertBefore(dragEl, item);
        } else {
          sortable.insertBefore(dragEl, item.nextSibling);
        }
      });
    });
  }

  function showModule(name, push = true) {
    closeMobileSidebar();
    sessionStorage.setItem('lastModule', name);
    if (push) history.pushState({ module: name }, '', '#' + name);

    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.module === name);
    });

    const main = document.getElementById('main-content');
    main.innerHTML = `
      <div class="flex items-center justify-center h-64">
        <i class="fas fa-circle-notch fa-spin text-3xl text-blue-500 opacity-60"></i>
      </div>`;

    requestAnimationFrame(() => loadPage(name, main));
    updateBackButton();
  }

  function loadPage(name, container) {
    if (window.WorkVoltPages && typeof window.WorkVoltPages[name] === 'function') {
      window.WorkVoltPages[name](container);
      return;
    }

    const existing = document.querySelector(`script[data-page="${name}"]`);
    if (existing) existing.remove();

    const script = document.createElement('script');
    script.src = `pages/${name}.js`;
    script.dataset.page = name;
    script.onload = () => {
      if (window.WorkVoltPages && typeof window.WorkVoltPages[name] === 'function') {
        window.WorkVoltPages[name](container);
      } else {
        renderPagePlaceholder(name, container);
      }
    };
    script.onerror = () => renderPagePlaceholder(name, container);
    document.head.appendChild(script);
  }

  function renderPagePlaceholder(name, container) {
    const label = MODULE_LABELS[name] || name;
    const icon = MODULE_ICONS[name] || 'fa-layer-group';
    container.innerHTML = `
      <div class="p-6 md:p-8 fade-in">
        <div class="max-w-2xl mx-auto mt-16 text-center">
          <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-50 rounded-2xl mb-6">
            <i class="fas ${icon} text-blue-400 text-3xl"></i>
          </div>
          <h2 class="text-2xl font-extrabold text-slate-800 mb-2">${label}</h2>
          <p class="text-slate-500 mb-6 text-sm leading-relaxed">
            This page is ready to be built as its own module.<br>
            Create <code class="bg-slate-100 px-2 py-0.5 rounded text-blue-600 font-mono text-xs">pages/${name}.js</code> and register it with <code class="bg-slate-100 px-2 py-0.5 rounded text-blue-600 font-mono text-xs">WorkVoltPages.${name}</code>.
          </p>
        </div>
      </div>`;
  }

  window.addEventListener('popstate', e => {
    const mod = e.state?.module || 'dashboard';
    showModule(mod, false);
  });

  function updateBackButton() {
    document.getElementById('app-back-btn').classList.toggle('hidden', history.length <= 1);

    e?.stopPropagation();
    const dd = document.getElementById('user-dropdown');
    const wasHidden = dd.classList.contains('hidden');
    dd.classList.toggle('hidden');
    if (wasHidden) renderUserDropdown();

    const sidebar = document.getElementById('sidebar');
    const collapsed = sidebar.classList.toggle('collapsed');
    localStorage.setItem('wv_sidebar_collapsed', collapsed ? '1' : '0');
  }

  function applySidebarCollapse() {
    if (localStorage.getItem('wv_sidebar_collapsed') === '1') {
      document.getElementById('sidebar').classList.add('collapsed');
    }
  }

  function toggleMobileSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('visible');
  }
  function closeMobileSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('visible');
  }

  // ─────────────────────────────────────────────
  //  TOAST
  // ─────────────────────────────────────────────
  function showToast(msg, type = 'info', duration = 3500) {
    const icons = { success:'fa-check-circle', error:'fa-exclamation-circle', info:'fa-info-circle', warning:'fa-triangle-exclamation' };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i><span>${msg}</span>`;
    document.getElementById('toast-container').appendChild(toast);
    setTimeout(() => {
      toast.style.animation = 'toastOut .3s ease forwards';
      setTimeout(() => toast.remove(), 300);
    }, duration);
  }

  document.addEventListener('click', e => {
    if (!document.getElementById('user-menu-container')?.contains(e.target))
      closeUserMenu();
  });

  // Expose globals
  window.WorkVolt = {
    api: apiCall,
    user: () => currentUser,
    session: () => currentSession,
    toast: showToast,
    navigate: showModule,
  };
  window.WorkVoltPages = window.WorkVoltPages || {};
  window.renderNav = renderNav;
  window._wvRolePermissions = () => _rolePermissions;
  window._wvUserOverrides = () => _userModuleOverrides;
  window._wvApplyPermissions = function(perms, overrides) {
    if (perms) _rolePermissions = perms;
    if (overrides) _userModuleOverrides = overrides;
    renderNav();
  };

  // ─────────────────────────────────────────────
  //  BOOT SEQUENCE
  // ─────────────────────────────────────────────
  window.addEventListener('load', async () => {
    try {
      const savedUser = sessionStorage.getItem('wv_user');
      const savedSession = sessionStorage.getItem('wv_session');
      const savedUrl = sessionStorage.getItem('wv_gas_url') || (window.sessionData && window.sessionData.gas_url) || '';
      
      console.log('Boot check:', { hasUser: !!savedUser, hasSession: !!savedSession, hasUrl: !!savedUrl });
      
      if (!savedUser || !savedSession || !savedUrl) {
        console.log('Missing credentials, redirecting to login');
        window.location.href = 'index.html';
        return;
      }

      API_URL = savedUrl;
      window.API_URL = savedUrl;
      currentUser = JSON.parse(savedUser);
      currentSession = savedSession;

      console.log('Starting app load...');

      try {
        await loadInstalledModules();
        console.log('Modules loaded:', INSTALLED_MODULES);
      } catch (e) {
        console.error('Module load failed:', e);
      }

      try {
        await loadRolePermissions();
        console.log('Permissions loaded');
      } catch (e) {
        console.error('Permissions load failed:', e);
      }

      hideSplash();
      await showApp();
      console.log('App shown successfully');
      
    } catch (err) {
      console.error('Fatal boot error:', err);
      alert('Failed to start app: ' + err.message);
      window.location.href = 'index.html';
    }
  });
  </script>
